name: CI

on:
  push:
  pull_request:

jobs:
  test:
    name: pytest / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package
        run: python -m pip install -e ".[dev]"

      - name: Run tests
        run: pytest

      - name: Run demo smoke checks
        run: python scripts/smoke_check.py

  package:
    name: build and install wheel
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Build distribution artifacts
        run: python -m pip install build && python -m build

      - name: Install wheel in a clean environment
        run: |
          python -m venv .wheel-venv
          .wheel-venv/bin/python -m pip install dist/xists-*.whl
          .wheel-venv/bin/xists --help
          .wheel-venv/bin/xists version
          .wheel-venv/bin/python scripts/smoke_check.py
